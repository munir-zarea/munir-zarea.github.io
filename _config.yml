# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Main Page Setup

title: Munir Zarea's Portfolio # This is what shows up in the tab of the browser



# Hero Section
name: Munir Zarea
headline: Hello!
description: >- # dont remove this line. this will ignore all new lines until the next section
  I am a Mechanical Engineering Master’s student at the University of Hawaiʻi at Mānoa, graduating Spring 2026, with a focus on subsea robotics and underwater system development.

I design and build bio-inspired manipulators, pressure-tolerant camera enclosures, and sensor-integrated platforms. 

I am particularly interested in hands-on engineering involving marine robotics, autonomous systems, and subsea instrumentation.
# Place your profile image in /assets/images/profile-image/folder and edit the file name
profile_image: ./assets/images/profile-image/Profile_Picture_Munir.jpeg


# Link your resume
