    - SolidWorks
    - Creo
    - Siemens NX
    - Onshape
    - Mechanical drawings
    - GD&T
    - Design Documentation
    
  - category: Maritime & Subsea Systems
    tools: 
    - Underwater enclosures
    - Buoyancy and propulsion mechanisms
    - Subsea sensors
    
  - category: Controls & Robotics
    tools:
    - ROS2 node development
    - Robotic actuation (servo, pneumatic systems)
    - Sensor fusion (IMU, stereo vision)
    - Feedback control systems
    
  - category: Prototyping & Testing
    tools:
    - Rapid prototype development & iteration
    - Hardware validation and bench testing
    - Ocean deployment testing
    - Waterproofing & pressure testing
    
  - category: Programming & Tools
    tools:
    - Python (data analysis, robotics)
    - C++ (ROS2 nodes)
    - MATLAB (modeling & simulation)
    - Data acquisition & analysis
    
  - category: System Engineering/Integration
    tools: 
    - System integration (mechanical, electrical, software)
    - Hardware-in-the-loop (HWIL) testing
    - Requirements-driven design


